name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Syntax-check every JS file
        run: |
          status=0
          for f in $(find api lib -name '*.js'); do
            node --check "$f" || status=1
          done
          exit $status
